services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdf_confirmation
      POSTGRES_PASSWORD: pdf_confirmation
      POSTGRES_USER: pdf_confirmation
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf_confirmation -d pdf_confirmation"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      BETTER_AUTH_SECRET: development-only-secret-placeholder-123456
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://pdf_confirmation:pdf_confirmation@db:5432/pdf_confirmation?schema=public
      LOCAL_UPLOAD_DIR: /app/uploads
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BOOTSTRAP_ADMIN_EMAIL: admin@local.test
      BOOTSTRAP_ADMIN_PASSWORD: Admin!2026-Verify
      BOOTSTRAP_ADMIN_NAME: Local Admin
    command: >
      sh -c "npx prisma db push --skip-generate && node scripts/bootstrap-admin.mjs"
    volumes:
      - uploads:/app/uploads

  app:
    build:
      context: .
      target: runner
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      BETTER_AUTH_SECRET: development-only-secret-placeholder-123456
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://pdf_confirmation:pdf_confirmation@db:5432/pdf_confirmation?schema=public
      LOCAL_UPLOAD_DIR: /app/uploads
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
